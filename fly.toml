app = "YOUR_UNIQUE_APP_NAME" # change after `fly launch` if needed

[env]
PYTHONUNBUFFERED='1'

[http_service]
internal_port = 8080
force_https = false
auto_stop_machines = false
auto_start_machines = true
min_machines_running = 1

[deploy]
release_command = 'python bot.py'

[mounts]
# Optional: for persistence if needed
# source = "data"
# destination = "/app/output"

[vm]
memory = 1024
cpu_kind = "shared"
cpus = 1